<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Remote Working Tools</title>
  <meta name="description" content="Get in touch with Remote Working Tools. We'd love to hear from you!">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://remoteworkingtools.net/contact.html">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.7; color: #333; background: #f8f9fa; }
    a { text-decoration: none; color: #1d4ed8; }
    
    header { background: #0f172a; color: white; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
    .header-content { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: 700; }
    nav a { margin-left: 1.5rem; opacity: 0.9; color: white; }
    
    .container { max-width: 700px; margin: 0 auto; padding: 3rem 2rem; }
    h1 { font-size: 2.5rem; color: #0f172a; margin-bottom: 1rem; text-align: center; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; }
    
    .contact-form { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #0f172a; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.875rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 1rem; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
    .form-group textarea { min-height: 150px; resize: vertical; }
    .submit-btn { width: 100%; padding: 1rem; background: #0f172a; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover { background: #334155; }
    
    .alternatives { margin-top: 2rem; text-align: center; color: #64748b; }
    .alternatives a { color: #1d4ed8; }
    
    footer { text-align: center; padding: 2rem; background: #0f172a; color: white; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="logo">📡 Remote Working Tools</a>
      <nav>
        <a href="/tools.html">Tools</a>
        <a href="/blog.html">Blog</a>
        <a href="/resources.html">Resources</a>
        <a href="/about.html">About</a>
      </nav>
    </div>
  </header>
  
  <div class="container">
    <h1>📬 Contact Us</h1>
    <p class="subtitle">Questions, feedback, or just want to say hi? Fill out the form below.</p>
    
    <div class="contact-form">
      <form action="#" method="POST">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Select a topic...</option>
            <option value="general">General Question</option>
            <option value="tool-recommendation">Request Tool Review</option>
            <option value="guest-post">Guest Post / Collaboration</option>
            <option value="bug">Report a Problem</option>
            <option value="other">Something Else</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message here..." required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>
    
    <div class="alternatives">
      <p>Prefer email? <a href="mailto:hello@remoteworkingtools.net">hello@remoteworkingtools.net</a></p>
      <p>Or find us on <a href="https://twitter.com" target="_blank" rel="nofollow">Twitter</a> and <a href="https://linkedin.com" target="_blank" rel="nofollow">LinkedIn</a></p>
    </div>
  </div>
  
  <footer>
    <p>© 2026 Remote Working Tools. All rights reserved.</p>
  </footer>
</body>
</html>
